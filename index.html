<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Evrei Zakarpattya</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      background: #e0e0e0;
      font-family: Arial, sans-serif;
    }

    #viewerContainer {
      position: absolute;
      inset: 0;
      overflow-y: auto;
      padding: 16px;
    }

    canvas {
      display: block;
      margin: 0 auto 16px auto;
      background: white;
      box-shadow: 0 2px 6px rgba(0,0,0,.2);
    }

    #loading {
      text-align: center;
      margin-top: 40px;
      font-size: 18px;
    }

    #error {
      color: red;
      text-align: center;
      margin-top: 20px;
      white-space: pre-wrap;
      padding: 0 10px;
    }
  </style>
</head>
<body>

<div id="viewerContainer">
  <div id="loading">Загрузка PDF...</div>
  <div id="error"></div>
  <div id="viewer"></div>
</div>

<!-- ЛОКАЛЬНЫЙ PDF.js -->
<script src="./pdfjs/pdf.min.js"></script>

<script>
  const url = './book.pdf';

  const viewer = document.getElementById('viewer');
  const loading = document.getElementById('loading');
  const errorBox = document.getElementById('error');

  // Указываем локальный worker
  if (typeof pdfjsLib === 'undefined') {
    errorBox.textContent = 'pdfjsLib не загрузился. Проверь путь ./pdfjs/pdf.min.js';
    throw new Error('PDF.js не подключен');
  }

  pdfjsLib.GlobalWorkerOptions.workerSrc = './pdfjs/pdf.worker.min.js';

  async function renderPDF() {
    try {
      const loadingTask = pdfjsLib.getDocument(url);

      loadingTask.onProgress = function(progressData) {
        if (progressData.total) {
          const percent = Math.round((progressData.loaded / progressData.total) * 100);
          loading.textContent = 'Загрузка PDF... ' + percent + '%';
        }
      };

      const pdf = await loadingTask.promise;

      loading.style.display = 'none';

      for (let pageNum = 1; pageNum <= pdf.numPages; pageNum++) {
        const page = await pdf.getPage(pageNum);

        const scale = 1.25;
        const viewport = page.getViewport({ scale });

        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');

        canvas.width = viewport.width;
        canvas.height = viewport.height;

        viewer.appendChild(canvas);

        await page.render({
          canvasContext: ctx,
          viewport: viewport
        }).promise;
      }

    } catch (err) {
      console.error(err);
      loading.style.display = 'none';
      errorBox.textContent = 'Ошибка загрузки PDF:\n\n' + err;
    }
  }

  renderPDF();
</script>

</body>
</html>
